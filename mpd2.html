<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bokul Sports</title>
  <script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>
  <script>jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      height: -webkit-fill-available;
    }
    .jwplayer, .jw-wrapper, .jw-media, .jw-media video {
      width: 100% !important;
      height: 100% !important;
    }
    #err {
      display: none; position: fixed; inset: 0;
      background: #000; color: #888;
      flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      font-family: sans-serif; font-size: 15px;
    }
    #err.on { display: flex; }
    #err code { background: #111; color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 12px; word-break: break-all; max-width: 90vw; }
  </style>
</head>
<body>

<div id="player"></div>
<div id="err" id="err">
  <span>No stream URL provided.</span>
  <span>Usage: <code>player.html?url=https://example.com/stream.m3u8</code></span>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const src = params.get('url') || params.get('stream') || params.get('src') || params.get('file') || '';

  if (!src) {
    document.getElementById('err').classList.add('on');
  } else {
    jwplayer("player").setup({
      file:        src,
      type:        "hls",
      width:       "100%",
      height:      window.innerHeight + "px",
      autostart:   true,
      controls:    true,
      preload:     "auto",
      primary:     "html5",
      hlshtml:     true,
      stretching:  "exactfit",
      pipIcon:     "enabled",
      aboutlink:   "/#",
      logo: { margin: 15, position: "top-right", link: "#" },
      captions: { color: "#ffb800", fontSize: 30, backgroundOpacity: 0 }
    });
  }
</script>

</body>
</html>
