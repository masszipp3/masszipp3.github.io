    .brand { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .brand-name {

      animation: shimmer 2.5s linear infinite;

    .ring-mid { position: absolute; inset: 9%; border-radius: 50%; border: 2px solid transparent; border-bottom-color: #aaaaff; border-left-color: #aaaaff33; animation: spin-reverse 1.8s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes spin-reverse { to { transform: rotate(-360deg); } }
    .center-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .play-triangle { width: 0; height: 0; border-style: solid; border-width: clamp(8px, 2vmin, 18px) 0 clamp(8px, 2vmin, 18px) clamp(14px, 3vmin, 30px); border-color: transparent transparent transparent #5555ff; margin-left: 6px; animation: pulse-icon 1.5s ease-in-out infinite; }
    @keyframes pulse-icon { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.85); } }
    .orbit { position: absolute; inset: 0; animation: spin 1.2s linear infinite; }
    .orbit-dot { position: absolute; top: 3%; left: 50%; transform: translateX(-50%); width: clamp(4px, 1vmin, 8px); height: clamp(4px, 1vmin, 8px); background: #fff; border-radius: 50%; box-shadow: 0 0 8px #5555ff, 0 0 20px #5555ff88; }
    .load-bar-wrap { width: clamp(80px, 30vw, 200px); height: 2px; background: #1a1a2a; border-radius: 2px; overflow: hidden; }
    .load-bar { height: 100%; background: linear-gradient(90deg, #5555ff, #aaaaff); border-radius: 2px; animation: loadbar 1.8s ease-in-out infinite; }
    @keyframes loadbar { 0% { width: 0%; margin-left: 0; } 50% { width: 70%; margin-left: 15%; } 100% { width: 0%; margin-left: 100%; } }
    .load-text { font-size: clamp(8px, 1.5vw, 11px); letter-spacing: clamp(1px, 0.5vw, 3px); color: #333; text-transform: uppercase; animation: blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    #not-found p { font-size: 13px; color: #444; }

let loaderHidden = false;

function hideLoader() {
  if (loaderHidden) return;
  loaderHidden = true;
  const l = document.getElementById('loader');
  l.classList.add('fade-out');
  setTimeout(() => l.style.display = 'none', 650);
}

function showNotFound(hint) {
  hideLoader();
  document.getElementById('hint').textContent = hint;
  document.getElementById('not-found').classList.add('visible');
}

async function init() {
  shaka.polyfill.installAll();
  if (!shaka.Player.isBrowserSupported()) { hideLoader(); return; }

  const params = new URLSearchParams(window.location.search);
  const slug = (params.get('ch') || '').toLowerCase().trim();

  if (!slug) { showNotFound('?ch=channel-name'); return; }

  const ch = CHANNELS.find(c => c.slug === slug);
  if (!ch) { showNotFound('?ch=' + slug + ' (not found)'); return; }

  document.title = ch.name + ' — SportsTrack';
  setTimeout(hideLoader, 10000);

  const video = document.getElementById('main-video');
  const container = document.getElementById('video-container');
  const player = new shaka.Player(video);
  const ui = new shaka.ui.Overlay(player, container, video);
  ui.configure({
    controlPanelElements: ['play_pause', 'mute', 'volume', 'fullscreen', 'overflow_menu']
  });

  const config = {
    streaming: {
      bufferingGoal: 6,
      rebufferingGoal: 1.5,
      bufferBehind: 20,
      retryParameters: {
        maxAttempts: 3,
        baseDelay: 500,
        backoffFactor: 1.5,
        fuzzFactor: 0.3,
        timeout: 15000
      }
    }
  };

  if (ch.clearkey) {
    const parts = ch.clearkey.split(':');
    if (parts.length === 2) {
      config.drm = { clearKeys: { [parts[0]]: parts[1] } };
    }
  }

  player.configure(config);
  player.addEventListener('error', (e) => { console.error('Player error:', e.detail); hideLoader(); });
  video.addEventListener('playing', hideLoader, { once: true });

  try {
    await player.load(ch.url);
    video.muted = true;
    await video.play();
    video.muted = false;
  } catch(e) {
    try { video.muted = true; await video.play(); } catch(e2) { hideLoader(); }
  }
}

function showNotFound(hint) {
  hideLoader();
  document.getElementById('hint').textContent = hint;
  document.getElementById('not-found').classList.add('visible');
}

document.addEventListener('DOMContentLoaded', init);
</script>
