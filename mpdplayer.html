    #loader {
      position: fixed; inset: 0; background: #05050f;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: clamp(12px, 3vw, 32px); z-index: 999; transition: opacity 0.6s ease;
    }
    #loader.fade-out { opacity: 0; pointer-events: none; }
    .brand { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .brand-name {
      font-size: clamp(14px, 4vw, 32px); font-weight: 800;
      letter-spacing: clamp(1px, 0.5vw, 3px); text-transform: uppercase;
      background: linear-gradient(90deg, #fff 0%, #7777ff 50%, #fff 100%);
      background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 2.5s linear infinite;
    }
    .brand-sub { font-size: clamp(8px, 1.2vw, 11px); letter-spacing: clamp(2px, 0.8vw, 6px); text-transform: uppercase; color: #444; }
    @keyframes shimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
    .track-wrap { position: relative; width: clamp(80px, 20vmin, 220px); height: clamp(80px, 20vmin, 220px); }
    .ring-outer { position: absolute; inset: 0; border-radius: 50%; border: 2px solid transparent; border-top-color: #5555ff; border-right-color: #5555ff33; animation: spin 1.2s linear infinite; }
    .ring-mid { position: absolute; inset: 9%; border-radius: 50%; border: 2px solid transparent; border-bottom-color: #aaaaff; border-left-color: #aaaaff33; animation: spin-reverse 1.8s linear infinite; }
    .ring-inner { position: absolute; inset: 18%; border-radius: 50%; border: 1px solid transparent; border-top-color: #ffffff44; border-right-color: #ffffff22; animation: spin 2.4s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes spin-reverse { to { transform: rotate(-360deg); } }
    .center-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .play-triangle { width: 0; height: 0; border-style: solid; border-width: clamp(8px, 2vmin, 18px) 0 clamp(8px, 2vmin, 18px) clamp(14px, 3vmin, 30px); border-color: transparent transparent transparent #5555ff; margin-left: 6px; animation: pulse-icon 1.5s ease-in-out infinite; }
    @keyframes pulse-icon { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.85); } }
    .orbit { position: absolute; inset: 0; animation: spin 1.2s linear infinite; }
    .orbit-dot { position: absolute; top: 3%; left: 50%; transform: translateX(-50%); width: clamp(4px, 1vmin, 8px); height: clamp(4px, 1vmin, 8px); background: #fff; border-radius: 50%; box-shadow: 0 0 8px #5555ff, 0 0 20px #5555ff88; }
    .load-bar-wrap { width: clamp(80px, 30vw, 200px); height: 2px; background: #1a1a2a; border-radius: 2px; overflow: hidden; }
    .load-bar { height: 100%; background: linear-gradient(90deg, #5555ff, #aaaaff); border-radius: 2px; animation: loadbar 1.8s ease-in-out infinite; }
    @keyframes loadbar { 0% { width: 0%; margin-left: 0; } 50% { width: 70%; margin-left: 15%; } 100% { width: 0%; margin-left: 100%; } }
    .load-text { font-size: clamp(8px, 1.5vw, 11px); letter-spacing: clamp(1px, 0.5vw, 3px); color: #333; text-transform: uppercase; animation: blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    #video-container { width: 100vw; height: 100vh; position: relative; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    .shaka-video-container { width: 100% !important; height: 100% !important; }

    #not-found { display: none; position: fixed; inset: 0; background: #000; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    #not-found.visible { display: flex; }
    #not-found h2 { color: #888; font-size: 18px; font-weight: 500; }
    #not-found p { font-size: 13px; color: #444; }
    #not-found code { font-size: 13px; background: #111; color: #5555ff; padding: 4px 10px; border-radius: 4px; }

    /* FLOATING PLAYER */
    #float-btn {
      position: fixed;
      top: 16px; right: 16px;
      z-index: 100;
      background: rgba(20,20,35,0.85);
      border: 1px solid #333;
      color: #aaa;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(6px);
      transition: background 0.2s, color 0.2s;
      user-select: none;
    }
    #float-btn:hover { background: rgba(85,85,255,0.3); color: #fff; border-color: #5555ff; }
    #float-btn.visible { display: flex; }
    #float-btn svg { width: 14px; height: 14px; fill: currentColor; }

    #float-player {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 320px; height: 180px;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(85,85,255,0.3);
      z-index: 200;
      display: none;
      cursor: move;
      transition: box-shadow 0.2s;
    }
    #float-player.visible { display: block; }
    #float-player:hover { box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(85,85,255,0.6); }

    #float-video {
      width: 100%; height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }

    #float-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 6px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #float-player:hover #float-bar { opacity: 1; }

    .f-btn {
      background: none; border: none; color: #fff;
      cursor: pointer; padding: 3px; border-radius: 4px;
      line-height: 1; display: flex; align-items: center; justify-content: center;
    }
    .f-btn:hover { background: rgba(255,255,255,0.15); }
    .f-btn svg { width: 16px; height: 16px; fill: #fff; }

    #float-title {
      flex: 1; font-size: 11px; color: #ccc;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    #float-close {
      position: absolute;
      top: 6px; right: 6px;
      background: rgba(0,0,0,0.6);
      border: none; color: #fff;
      width: 22px; height: 22px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    #float-player:hover #float-close { opacity: 1; }
    #float-close:hover { background: #e00; }

    @media (max-width: 500px) {
      #float-player { width: 240px; height: 135px; bottom: 16px; right: 16px; }
    }

let loaderHidden = false;
let currentChannel = null;
let mainPlayer = null;

function hideLoader() {
  if (loaderHidden) return;
  loaderHidden = true;
  const l = document.getElementById('loader');
  l.classList.add('fade-out');
  setTimeout(() => l.style.display = 'none', 650);
}

function showNotFound(hint) {
  hideLoader();
  document.getElementById('hint').textContent = hint;
  document.getElementById('not-found').classList.add('visible');
}

// ── LIVE EDGE SEEK HELPER ──
// Shaka sometimes resolves the seekable range before the manifest fully
// settles on live streams, so we re-check it at several points after load.
function seekToLiveEdge(video, player) {
  try {
    if (!player) return;
    const seekRange = player.seekRange();
    if (!seekRange) return;
    const liveEdge = seekRange.end;
    // Only jump if we're meaningfully behind the edge (avoid micro-seeks)
    if (liveEdge && isFinite(liveEdge) && (liveEdge - video.currentTime) > 5) {
      video.currentTime = Math.max(seekRange.start, liveEdge - 1);
    }
  } catch (e) {
    // seekRange() can throw if called before load settles — ignore
  }
}

async function init() {
  shaka.polyfill.installAll();
  if (!shaka.Player.isBrowserSupported()) { hideLoader(); return; }

  const params = new URLSearchParams(window.location.search);
  const slug = (params.get('ch') || '').toLowerCase().trim();

  if (!slug) { showNotFound('?ch=channel-name'); return; }

  const ch = CHANNELS.find(c => c.slug === slug);
  if (!ch) { showNotFound('?ch=' + slug + ' (not found)'); return; }

  currentChannel = ch;
  await selectChannel(ch, true);
}

async function selectChannel(ch, isInitial) {
  currentChannel = ch;
  document.title = ch.name + ' — SportsTrack';

  if (!isInitial) {
    loaderHidden = false;
    const l = document.getElementById('loader');
    l.style.display = 'flex';
    l.classList.remove('fade-out');
  }

  setTimeout(hideLoader, 10000);

  const video = document.getElementById('main-video');
  const container = document.getElementById('video-container');

  if (mainPlayer) {
    try { await mainPlayer.unload(); } catch (e) {}
  } else {
    mainPlayer = new shaka.Player(video);
    const ui = new shaka.ui.Overlay(mainPlayer, container, video);
    ui.configure({
      controlPanelElements: ['play_pause', 'mute', 'volume', 'fullscreen', 'overflow_menu']
    });
  }

  const config = {
    streaming: {
      bufferingGoal: 6,
      rebufferingGoal: 1.5,
      bufferBehind: 20,
      liveSyncMinLatency: 1,
      liveSyncMaxLatency: 8,
      retryParameters: {
        maxAttempts: 3,
        baseDelay: 500,
        backoffFactor: 1.5,
        fuzzFactor: 0.3,
        timeout: 15000
      }
    }
  };

  if (ch.clearkey) {
    const parts = ch.clearkey.split(':');
    if (parts.length === 2) {
      config.drm = { clearKeys: { [parts[0]]: parts[1] } };
    }
  }

  mainPlayer.configure(config);
  mainPlayer.addEventListener('error', (e) => { console.error('Player error:', e.detail); hideLoader(); });
  video.addEventListener('playing', hideLoader, { once: true });

  // Seek to live edge once metadata is available (covers the case
  // where the initial player.load() lands before the live position resolves)
  const onLoadedMeta = () => {
    seekToLiveEdge(video, mainPlayer);
    video.removeEventListener('loadedmetadata', onLoadedMeta);
  };
  video.addEventListener('loadedmetadata', onLoadedMeta);

  try {
    await mainPlayer.load(ch.url);

    // Immediately after load resolves, try to jump to the live edge
    seekToLiveEdge(video, mainPlayer);

    video.muted = true;
    await video.play();
    video.muted = false;

    // One more delayed check — some streams report a short/incorrect
    // seek range right after load and settle a second or two later
    setTimeout(() => seekToLiveEdge(video, mainPlayer), 1500);
  } catch (e) {
    try {
      video.muted = true;
      await video.play();
      setTimeout(() => seekToLiveEdge(video, mainPlayer), 1500);
    } catch (e2) {
      hideLoader();
    }
  }

  onChannelLoaded();
}

// ── FLOATING PLAYER ──
let isFloating = false;
let floatChannel = null;
const floatVideo = document.getElementById('float-video');
const floatPlayer = document.getElementById('float-player');

function toggleFloat() {
  if (isFloating) {
    closeFloat();
  } else {
    openFloat();
  }
}

function openFloat() {
  if (!currentChannel) return;
  isFloating = true;
  floatChannel = currentChannel;

  initFloatPlayer(floatChannel);

  document.getElementById('float-title').textContent = floatChannel.name;
  floatPlayer.classList.add('visible');
  document.getElementById('float-btn').innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V5h18v14.02z"/></svg> Exit Float';
}

let floatShakaPlayer = null;

async function initFloatPlayer(ch) {
  if (floatShakaPlayer) {
    await floatShakaPlayer.unload();
    floatShakaPlayer.destroy();
    floatShakaPlayer = null;
  }

  floatShakaPlayer = new shaka.Player(floatVideo);

  const config = {
    streaming: {
      bufferingGoal: 6,
      rebufferingGoal: 1.5,
      liveSyncMinLatency: 1,
      liveSyncMaxLatency: 8
    }
  };
  if (ch.clearkey) {
    const parts = ch.clearkey.split(':');
    if (parts.length === 2) config.drm = { clearKeys: { [parts[0]]: parts[1] } };
  }
  floatShakaPlayer.configure(config);

  try {
    await floatShakaPlayer.load(ch.url);
    seekToLiveEdge(floatVideo, floatShakaPlayer);
    floatVideo.muted = true;
    await floatVideo.play();
    setTimeout(() => seekToLiveEdge(floatVideo, floatShakaPlayer), 1500);
  } catch (e) { console.warn('Float player error:', e); }
}

function closeFloat() {
  isFloating = false;
  floatPlayer.classList.remove('visible');
  if (floatShakaPlayer) {
    floatShakaPlayer.unload();
    floatShakaPlayer.destroy();
    floatShakaPlayer = null;
  }
  floatVideo.src = '';
  document.getElementById('float-btn').innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V5h18v14.02z"/></svg> Float';
}

function floatToMain() {
  if (floatChannel) selectChannel(floatChannel, false);
  closeFloat();
}

function toggleFloatPlay() {
  if (floatVideo.paused) {
    floatVideo.play();
    document.getElementById('f-pp-icon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  } else {
    floatVideo.pause();
    document.getElementById('f-pp-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
  }
}

function onChannelLoaded() {
  document.getElementById('float-btn').classList.add('visible');
}

// Draggable float player
(function() {
  let dragging = false, ox = 0, oy = 0;
  floatPlayer.addEventListener('mousedown', (e) => {
    if (e.target.closest('#float-bar') || e.target.closest('#float-close')) return;
    dragging = true;
    ox = e.clientX - floatPlayer.getBoundingClientRect().left;
    oy = e.clientY - floatPlayer.getBoundingClientRect().top;
    floatPlayer.style.transition = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const x = Math.max(0, Math.min(window.innerWidth  - floatPlayer.offsetWidth,  e.clientX - ox));
    const y = Math.max(0, Math.min(window.innerHeight - floatPlayer.offsetHeight, e.clientY - oy));
    floatPlayer.style.right = 'auto';
    floatPlayer.style.bottom = 'auto';
    floatPlayer.style.left = x + 'px';
    floatPlayer.style.top  = y + 'px';
  });
  document.addEventListener('mouseup', () => { dragging = false; });

  // Touch drag
  floatPlayer.addEventListener('touchstart', (e) => {
    if (e.target.closest('#float-bar') || e.target.closest('#float-close')) return;
    const t = e.touches[0];
    dragging = true;
    ox = t.clientX - floatPlayer.getBoundingClientRect().left;
    oy = t.clientY - floatPlayer.getBoundingClientRect().top;
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const t = e.touches[0];
    const x = Math.max(0, Math.min(window.innerWidth  - floatPlayer.offsetWidth,  t.clientX - ox));
    const y = Math.max(0, Math.min(window.innerHeight - floatPlayer.offsetHeight, t.clientY - oy));
    floatPlayer.style.right = 'auto';
    floatPlayer.style.bottom = 'auto';
    floatPlayer.style.left = x + 'px';
    floatPlayer.style.top  = y + 'px';
  }, { passive: true });
  document.addEventListener('touchend', () => { dragging = false; });
})();

document.addEventListener('DOMContentLoaded', init);
</script>
