<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportsTrack</title>
  <script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool@latest' disable-menu='true' clear-log='true'></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/controls.css">
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.ui.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* LOADER */
    #loader {
      position: fixed;
      inset: 0;
      background: #05050f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 3vw, 32px);
      z-index: 999;
      transition: opacity 0.6s ease;
    }
    #loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .brand { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .brand-name {
      font-size: clamp(14px, 4vw, 32px);
      font-weight: 800;
      letter-spacing: clamp(1px, 0.5vw, 3px);
      text-transform: uppercase;
      background: linear-gradient(90deg, #ffffff 0%, #7777ff 50%, #ffffff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 2.5s linear infinite;
    }
    .brand-sub { font-size: clamp(8px, 1.2vw, 11px); letter-spacing: clamp(2px, 0.8vw, 6px); text-transform: uppercase; color: #444; }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .track-wrap {
      position: relative;
      width: clamp(80px, 20vmin, 220px);
      height: clamp(80px, 20vmin, 220px);
    }

    .ring-outer {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #5555ff; border-right-color: #5555ff33;
      animation: spin 1.2s linear infinite;
    }
    .ring-mid {
      position: absolute; inset: 9%; border-radius: 50%;
      border: 2px solid transparent;
      border-bottom-color: #aaaaff; border-left-color: #aaaaff33;
      animation: spin-reverse 1.8s linear infinite;
    }
    .ring-inner {
      position: absolute; inset: 18%; border-radius: 50%;
      border: 1px solid transparent;
      border-top-color: #ffffff44; border-right-color: #ffffff22;
      animation: spin 2.4s linear infinite;
    }

    @keyframes spin         { to { transform: rotate(360deg);  } }
    @keyframes spin-reverse { to { transform: rotate(-360deg); } }

    .center-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .play-triangle {
      width: 0; height: 0;
      border-style: solid;
      border-width: clamp(8px, 2vmin, 18px) 0 clamp(8px, 2vmin, 18px) clamp(14px, 3vmin, 30px);
      border-color: transparent transparent transparent #5555ff;
      margin-left: 6px;
      animation: pulse-icon 1.5s ease-in-out infinite;
    }
    @keyframes pulse-icon {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.85); }
    }

    .orbit { position: absolute; inset: 0; animation: spin 1.2s linear infinite; }
    .orbit-dot {
      position: absolute; top: 3%; left: 50%; transform: translateX(-50%);
      width: clamp(4px, 1vmin, 8px); height: clamp(4px, 1vmin, 8px);
      background: #fff; border-radius: 50%;
      box-shadow: 0 0 8px #5555ff, 0 0 20px #5555ff88;
    }

    .load-bar-wrap { width: clamp(80px, 30vw, 200px); height: 2px; background: #1a1a2a; border-radius: 2px; overflow: hidden; }
    .load-bar {
      height: 100%;
      background: linear-gradient(90deg, #5555ff, #aaaaff);
      border-radius: 2px;
      animation: loadbar 1.8s ease-in-out infinite;
    }
    @keyframes loadbar {
      0%   { width: 0%;  margin-left: 0;    }
      50%  { width: 70%; margin-left: 15%;  }
      100% { width: 0%;  margin-left: 100%; }
    }

    .load-text {
      font-size: clamp(8px, 1.5vw, 11px); letter-spacing: clamp(1px, 0.5vw, 3px); color: #333; text-transform: uppercase;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    /* VIDEO */
    #video-container { width: 100vw; height: 100vh; position: relative; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    .shaka-video-container { width: 100% !important; height: 100% !important; }

    #not-found {
      display: none; position: fixed; inset: 0; background: #000;
      color: #555; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    }
    #not-found.visible { display: flex; }
    #not-found h2 { color: #888; font-size: 18px; font-weight: 500; }
    #not-found p  { font-size: 13px; color: #444; }
    #not-found code { font-size: 13px; background: #111; color: #5555ff; padding: 4px 10px; border-radius: 4px; }
  </style>
</head>
<body>

<div id="loader">
  <div class="brand">
    <div class="brand-name">SportsTrack</div>
    <div class="brand-sub">Live Streaming</div>
  </div>
  <div class="track-wrap">
    <div class="ring-outer"></div>
    <div class="ring-mid"></div>
    <div class="ring-inner"></div>
    <div class="orbit"><div class="orbit-dot"></div></div>
    <div class="center-icon"><div class="play-triangle"></div></div>
  </div>
  <div class="load-bar-wrap"><div class="load-bar"></div></div>
  <div class="load-text">Loading Stream</div>
</div>

<div id="video-container" data-shaka-player-container>
  <video id="main-video" autoplay muted playsinline data-shaka-player></video>
</div>

<div id="not-found">
  <h2>Channel not found</h2>
  <p>Use <code id="hint"></code> in the URL</p>
  <p style="color:#333; font-size:12px; margin-top:8px;">e.g. <code>player.html?ch=spotv</code></p>
</div>
